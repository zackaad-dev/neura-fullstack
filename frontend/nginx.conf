server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html; 
    }

    # Standardize the proxy to hit the backend service name defined in docker-compose
    location /api/ {
        proxy_pass http://backend:8080/api/; # Note the trailing slash consistency
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Don't forget your health checks!
    location /actuator/ {
    proxy_pass http://backend:81/actuator/;
    proxy_set_header Host $host;
    }
}